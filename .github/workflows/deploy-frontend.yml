name: Deploy DeepClariti Frontend to Cloud Run
on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'
env:
  REGION: asia-south1
  SERVICE_NAME: deepclariti-frontend
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev
  IMAGE_REPO: pysellers/deepclarity
  WORKLOAD_IDENTITY_PROVIDER: projects/745036261829/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-deployer@pysellers.iam.gserviceaccount.com
jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify Dockerfile
        run: |
          echo "=== Dockerfile content ==="
          cat frontend/Dockerfile
          echo "=== Files in frontend ==="
          ls -la frontend/
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet
      - name: Build Docker image
        run: docker build --build-arg NEXT_PUBLIC_API_URL=https://deepclariti-api-cnh4u4gu6q-el.a.run.app/api -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} ./frontend
      - name: Push Docker image
        run: docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --quiet
